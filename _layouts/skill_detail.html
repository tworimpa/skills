---
layout: default
---

<div class="skill-detail-container">
  <div class="skill-detail-header glass">
    <div class="skill-meta">
      <span class="skill-author">@{{ page.author }} / {{ page.repo }}</span>
      <h1 class="skill-title-large">{{ page.title }}</h1>
      <p class="skill-desc-large">{{ page.description }}</p>
    </div>
    <div class="skill-tags">
      {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>

    <!-- Installation Command -->
    <div class="install-command-wrapper">
      <div class="install-command glass">
        <span class="command-text" id="installCmd">npx skills add https://github.com/{{ page.author }}/{{ page.repo }} --skill {{ page.id }}</span>
        <button class="copy-button" onclick="copyCommand()" aria-label="Copy command">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
      <span class="copy-feedback" id="copyFeedback">Copied!</span>
    </div>
  </div>

  <script>
    function copyCommand() {
      const cmdText = document.getElementById('installCmd').innerText;
      navigator.clipboard.writeText(cmdText).then(() => {
        const feedback = document.getElementById('copyFeedback');
        feedback.classList.add('show');
        setTimeout(() => {
          feedback.classList.remove('show');
        }, 2000);
      });
    }
  </script>

  <div class="skill-content glass">
    {{ content }}
  </div>

  <div class="skill-actions">
    <a href="{{ '/' | relative_url }}" class="back-link">&larr; Back to Skills</a>
  </div>
</div>
